<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Student Info Form</title>
    <link rel="stylesheet" href="./rcDataCollection/style.css" />
  </head>
  <body>
    <h2>Student Information</h2>

    <form id="studentForm">
      <label for="studentName">Student Name:</label>
      <input type="text" id="studentName" name="studentName" required />

      <label for="class">Basic:</label>
      <input list="classOptions" type="text" id="grade" name="class" required />
      <datalist id="classOptions">
        <option value="Basic 1"></option>
        <option value="Basic 2"></option>
        <option value="Basic 3"></option>
        <option value="Basic 4"></option>
        <option value="Basic 5"></option>
        <option value="Basic 6"></option>
      </datalist>

      <label for="term">Term:</label>

      <!-- I have intentinally prefilled the term Input with "1", because its first term -->
      <input list="termOptions" id="term" name="term" value="1" required />
      <datalist id="termOptions">
        <option value="1"></option>
        <option value="2"></option>
        <option value="3"></option>
      </datalist>

      <label for="year">Year:</label>

      <!-- I have intentinally prefilled the year Input with "2025", because its 2025  -->
      <input list="yearOptions" id="year" name="year" value="2025" required />
      <datalist id="yearOptions">
        <option value="2025"></option>
      </datalist>

      <button
        id="Next-Student-Form"
        type="submit"
        class="btn-disabled"
        disabled
      >
        Next
      </button>
    </form>

    <form id="scoresForm">
      <div class="subject">
        <label>English</label>
        <input
          type="number"
          class="sba"
          id="english-sba"
          min="0"
          max="30"
          placeholder="Class Score (0-30)"
          required
        />
        <input
          type="number"
          class="exam"
          id="english-exam"
          min="0"
          max="100"
          placeholder="Exam Score (0-100)"
          required
        />
      </div>

      <div class="subject">
        <label>Mathematics</label>
        <input
          type="number"
          class="sba"
          id="mathematics-sba"
          min="0"
          max="30"
          placeholder="Class Score (0-30)"
          required
        />
        <input
          type="number"
          class="exam"
          id="mathematics-exam"
          min="0"
          max="100"
          placeholder="Exam Score (0-100)"
          required
        />
      </div>

      <div class="subject">
        <label>Science</label>
        <input
          type="number"
          class="sba"
          id="science-sba"
          min="0"
          max="30"
          placeholder="Class Score (0-30)"
          required
        />
        <input
          type="number"
          class="exam"
          id="science-exam"
          min="0"
          max="100"
          placeholder="Exam Score (0-100)"
          required
        />
      </div>

      <!-- Updated: History → Social -->
      <div class="subject">
        <label>History</label>
        <input
          type="number"
          class="sba"
          id="history-sba"
          min="0"
          max="30"
          placeholder="Class Score (0-30)"
          required
        />
        <input
          type="number"
          class="exam"
          id="history-exam"
          min="0"
          max="100"
          placeholder="Exam Score (0-100)"
          required
        />
      </div>

      <div class="subject">
        <label>Religious & Moral Education</label>
        <input
          type="number"
          class="sba"
          id="rme-sba"
          min="0"
          max="30"
          placeholder="Class Score (0-30)"
          required
        />
        <input
          type="number"
          class="exam"
          id="rme-exam"
          min="0"
          max="100"
          placeholder="Exam Score (0-100)"
          required
        />
      </div>

      <div class="subject" id="comHide">
        <label>Computing</label>
        <input
          type="number"
          class="sba"
          id="computing-sba"
          min="0"
          max="30"
          placeholder="Class Score (0-30)"
          required
        />
        <input
          type="number"
          class="exam"
          id="computing-exam"
          min="0"
          max="100"
          placeholder="Exam Score (0-100)"
          required
        />
      </div>

      <div class="subject">
        <label>Creative Arts</label>
        <input
          type="number"
          class="sba"
          id="creativity-sba"
          min="0"
          max="30"
          placeholder="Class Score (0-30)"
          required
        />
        <input
          type="number"
          class="exam"
          id="creativity-exam"
          min="0"
          max="100"
          placeholder="Exam Score (0-100)"
          required
        />
      </div>

      <button id="Next-Scores-Form" type="submit" class="btn-disabled" disabled>
        Next
      </button>
    </form>

    <!-- Overall Performance -->
    <form id="ovrPerformance">
      <label for="attendance">Attendance:</label>
      <input type="number" id="attendance" name="attendance" required />

      <label for="attitude">Attitude:</label>
      <input
        list="attitudeOptions"
        type="text"
        id="attitude"
        name="attitude"
        required
      />

      <datalist id="attitudeOptions">
        <option
          value="(1) Demonstrates a positive attitude towards learning."
        ></option>
        <option
          value="(2) Approaches tasks with confidence and determination."
        ></option>
        <option
          value="(3) Maintains a respectful and cooperative attitude in class."
        ></option>
        <option
          value="(4) Shows enthusiasm but needs to sustain focus consistently."
        ></option>
        <option
          value="(5) Is generally attentive and eager to participate."
        ></option>
      </datalist>

      <label for="character">Character/Conduct:</label>
      <input
        list="characterOptions"
        type="text"
        id="character"
        name="character"
        required
      />
      <datalist id="characterOptions">
        <option
          value="(1) Displays honesty and integrity in all activities."
        ></option>
        <option
          value="(2) Respects authority and the rights of others."
        ></option>
        <option
          value="(3) Polite and well-behaved both inside and outside the classroom."
        ></option>
        <option
          value="(4) Needs occasional reminders to follow classroom rules."
        ></option>
        <option
          value="(5) Consistently demonstrates self-discipline and maturity."
        ></option>
      </datalist>

      <label for="interest">Interest:</label>
      <input
        list="interestOptions"
        type="text"
        id="interest"
        name="interest"
        required
      />
      <datalist id="interestOptions">
        <option
          value="(1) Shows keen interest in academic work and extracurricular activities."
        ></option>
        <option value="(2) Is curious and asks thoughtful questions."></option>
        <option
          value="(3) Maintains steady interest but requires encouragement in some subjects."
        ></option>
        <option
          value="(4) Demonstrates a strong desire to explore new ideas."
        ></option>
        <option
          value="(5) Needs to develop greater interest in independent reading and research."
        ></option>
      </datalist>

      <label for="ct-remarks">Class Teacher's Remarks:</label>
      <input
        list="remarksOptions"
        type="text"
        id="ct-remarks"
        name="ct-remarks"
        required
      />
      <datalist id="remarksOptions">
        <option
          value="(1) A hardworking and responsible student; keep up the good effort."
        ></option>
        <option
          value="(2) Shows steady progress; should continue to build confidence."
        ></option>
        <option
          value="(3) Has potential to excel further with greater concentration."
        ></option>
        <option
          value="(4) A pleasant student to teach; should aim for consistency."
        ></option>
        <option
          value="(5) Needs to be more attentive in class to maximize full potential."
        ></option>
      </datalist>

      <button id="saveStudentBtn" type="button" class="btn-disabled" disabled>
        Save Student
      </button>

      <button id="nextStudentBtn" type="button" class="btn-disabled" disabled>
        Enter Next Student
      </button>

      <button id="genRepCardBtn" type="button" class="btn-disabled" disabled>
        Generate Report Card
      </button>

      <select id="studentDropdown" class="hidden">
        <option value="">-- Select Student --</option>
      </select>
    </form>

    <script src="./rcDataCollection/index.js"></script>
  </body>
</html>
